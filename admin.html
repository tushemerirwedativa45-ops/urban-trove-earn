<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        .bg-carousel {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .bg-slide.active { opacity: 1; }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
        }

        .admin-login-box {
            position: relative;
            z-index: 1;
            background: rgba(30, 58, 95, 0.60);
            backdrop-filter: blur(14px);
            border: 2px solid #FFD700;
            border-radius: 14px;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .admin-login-box {
            background: rgba(30, 58, 95, 0.60);
            backdrop-filter: blur(14px);
            border: 2px solid #FFD700;
            border-radius: 14px;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .admin-login-box h1 {
            color: #FFD700;
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .admin-login-box p {
            color: #aaa;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .admin-login-box label {
            color: #ccc;
            font-size: 0.9rem;
        }

        .admin-login-box input {
            background: rgba(0,0,0,0.3);
            border: 1px solid #FFD700;
            color: white;
            border-radius: 6px;
            padding: 10px;
            width: 100%;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .admin-login-box input:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.2);
        }

        .admin-login-box button {
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #ffed4e);
            color: #002a5c;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .admin-login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(255,215,0,0.35);
        }

        #admin-login-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
            font-size: 0.95rem;
        }

        #admin-login-status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #admin-login-status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .lock-icon {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-carousel">
        <div class="bg-slide active" style="background-image:url('adminpics/Screenshot 2026-04-12 at 17-27-39 Google Search.png')"></div>
        <div class="bg-slide" style="background-image:url('adminpics/Screenshot 2026-04-12 at 17-28-01 Google Search.png')"></div>
        <div class="bg-slide" style="background-image:url('adminpics/Screenshot 2026-04-12 at 17-28-22 Google Search.png')"></div>
        <div class="bg-slide" style="background-image:url('adminpics/Screenshot 2026-04-12 at 17-28-44 Google Search.png')"></div>
        <div class="bg-slide" style="background-image:url('adminpics/Screenshot 2026-04-12 at 17-29-12 Google Search.png')"></div>
        <div class="bg-overlay"></div>
    </div>
    <div class="admin-login-box">
        <div class="lock-icon">🔐</div>
        <h1>ADMIN ACCESS</h1>
        <p>Urban Trove Earn — Restricted Area</p>

        <form id="admin-login-form">
            <div class="form-group">
                <label for="admin-username">Username</label>
                <input type="text" id="admin-username" placeholder="Enter admin username" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Password</label>
                <input type="password" id="admin-password" placeholder="Enter password" required>
            </div>
            <button type="submit">LOGIN TO PANEL</button>
        </form>

        <div id="admin-login-status"></div>
    </div>

    <script src="admin.js"></script>
    <script>
        const bgSlides = document.querySelectorAll('.bg-slide');
        let bgCurrent = 0;
        setInterval(() => {
            bgSlides[bgCurrent].classList.remove('active');
            bgCurrent = (bgCurrent + 1) % bgSlides.length;
            bgSlides[bgCurrent].classList.add('active');
        }, 4000);
    </script>
</body>
</html>
