services:
  - type: web
    name: urban-trove-earn
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://urban-trove-earn.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: urban-trove-earn-db
          property: connectionString

databases:
  - name: urban-trove-earn-db
    databaseName: urban_trove_earn
    user: ute_admin
    plan: free
